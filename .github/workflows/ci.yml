name: CI — Build & Type Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Kiểm tra Backend ───────────────────────────────────────
  backend-ci:
    name: Backend — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (check compile errors)
        run: npm run build

  # ─── Kiểm tra Frontend ──────────────────────────────────────
  frontend-ci:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (check compile errors)
        run: npm run build
        env:
          # Dùng placeholder khi CI, không cần backend thật
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
