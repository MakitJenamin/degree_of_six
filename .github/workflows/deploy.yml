name: CD — Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"      # Chỉ trigger khi có thay đổi trong backend/
      - ".github/workflows/deploy.yml"

jobs:
  deploy-backend:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        # Render cấp 1 URL webhook riêng, gọi URL này là Render tự deploy
        # Vào Render Dashboard → Service → Settings → Deploy Hook → copy URL
        # Sau đó vào GitHub repo → Settings → Secrets → thêm RENDER_DEPLOY_HOOK_URL
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Triggered Render deploy successfully"
